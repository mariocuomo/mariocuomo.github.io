Descriptor:
  Name: WeeklyUserAssessmentPlugin
  DisplayName: Weekly Entra User Assessment Plugin
  Description:  Skills used weekly to performa an Entra User Assessment
  Settings:
    - Name: TenantId
      Required: true
    - Name: WorkspaceName
      Required: true
    - Name: SubscriptionId
      Required: true
    - Name: ResourceGroupName
      Required: true
  SupportedAuthTypes:
    - None
SkillGroups:
  - Format: KQL
    Skills:
      - Name: CountByRiskState
        DisplayName: Count By Risk State
        Description: Skill used to count how many user for each distinct RiskState
        Settings:
          Target: Sentinel
          TenantId: '{{TenantId}}'
          SubscriptionId: '{{SubscriptionId}}'
          ResourceGroupName: '{{ResourceGroupName}}'
          WorkspaceName: '{{WorkspaceName}}'
          Template: |-
           AADRiskyUsers
           | summarize arg_max(TimeGenerated, *) by UserPrincipalName
           | summarize count() by RiskState
      - Name: CountByRiskLevel
        DisplayName: Count By Risk Level
        Description: Skill used to count how many user for each distinct RiskLevel (with RiskState atRisk)
        Settings:
          Target: Sentinel
          TenantId: '{{TenantId}}'
          SubscriptionId: '{{SubscriptionId}}'
          ResourceGroupName: '{{ResourceGroupName}}'
          WorkspaceName: '{{WorkspaceName}}'
          Template: |-
           AADRiskyUsers
           | where RiskState == "atRisk"
           | summarize arg_max(TimeGenerated, *) by UserPrincipalName
           | summarize count() by RiskLevel
      - Name: AtRiskUserWithEvidence
        DisplayName: Risky User with Sign-in Evidence
        Description: Skill used to return the user atRisk with last AtRisk activity performed during a signin
        Settings:
          Target: Sentinel
          TenantId: '{{TenantId}}'
          SubscriptionId: '{{SubscriptionId}}'
          ResourceGroupName: '{{ResourceGroupName}}'
          WorkspaceName: '{{WorkspaceName}}'
          Template: |-
           AADRiskyUsers
           | where RiskState == "atRisk"
           | summarize arg_max(TimeGenerated, *) by UserPrincipalName
           | project UserPrincipalName, RiskLevel
           | join kind= leftouter (
              AADUserRiskEvents
              | where RiskState == "atRisk"
              | where Activity == "signin"
              | summarize arg_max(TimeGenerated, *) by UserPrincipalName
              | extend RiskReasons = iff(AdditionalInfo[0].Key == "riskReasons", AdditionalInfo[0].Value, RiskEventType) 
              | project UserPrincipalName, RiskReasons, IpAddress) on UserPrincipalName
           | project UserPrincipalName, RiskLevel, RiskReasons, IpAddress
